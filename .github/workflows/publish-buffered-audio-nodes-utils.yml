name: Publish Buffered Audio Nodes Utils

on:
  push:
    branches: [main]
    paths:
      - 'packages/buffered-audio-nodes-utils/package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/buffered-audio-nodes-utils/package.json').version")
          PUBLISHED=$(npm view @buffered-audio/utils@$PACKAGE_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Type check and lint (topo-ordered, builds deps first)
        if: steps.check.outputs.skip == 'false'
        run: npx turbo check --filter=@buffered-audio/utils

      - name: Run unit tests
        if: steps.check.outputs.skip == 'false'
        run: npx turbo unit --filter=@buffered-audio/utils

      - name: Build (topo-ordered)
        if: steps.check.outputs.skip == 'false'
        run: npx turbo build --filter=@buffered-audio/utils

      - name: Run integration tests
        if: steps.check.outputs.skip == 'false'
        run: npx turbo run integration --filter=@buffered-audio/utils

      - name: Cache binaries (content-addressed sha256 cache)
        if: steps.check.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: .binaries-cache
          key: binaries-linux-x64-${{ hashFiles('binaries.manifest.json') }}
          restore-keys: |
            binaries-linux-x64-

      - name: Fetch audio test fixtures
        if: steps.check.outputs.skip == 'false'
        run: npm run fixtures:audio

      - name: Fetch binary + model test fixtures
        if: steps.check.outputs.skip == 'false'
        run: npm run fixtures:binaries -- --target linux-x64

      - name: Run heavy integration tests
        if: steps.check.outputs.skip == 'false'
        run: npx turbo run integration:heavy --filter=@buffered-audio/utils

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish --workspace=packages/buffered-audio-nodes-utils --access public
